apiVersion: apps/v1
kind: Deployment
metadata:
  name: itverse-web
  namespace: itverse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: itverse-web
  template:
    metadata:
      labels:
        app: itverse-web
    spec:
      containers:
        - name: web
          image: ahmeduioueu235g/itverse-web:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: itverse-config
            - secretRef:
                name: itverse-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
