name: Build and Push (Docker Hub)

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: itverse-web
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: itverse-eks

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kubectl
        if: github.ref == 'refs/heads/main'
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to EKS (rolling update)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        if: github.ref == 'refs/heads/main'
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Rollout restart in EKS
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"
          kubectl -n itverse rollout restart deploy/itverse-web
          kubectl -n itverse rollout status deploy/itverse-web --timeout=240s
          echo "Deployed. Current image:"
          kubectl -n itverse get deploy itverse-web -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'


